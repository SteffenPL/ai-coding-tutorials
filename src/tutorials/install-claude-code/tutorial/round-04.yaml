kind: claude
prompt: Open the webpage

steps:
  - type: tool_call
    toolName: Bash
    code: open game-of-life.html
    comment:
      en: >-
        On macOS, <code>open</code> hands the file to Launch Services, which
        routes <code>.html</code> to your default browser. It's the CLI
        equivalent of double-clicking in Finder.
      ja: >-
        macOS では <code>open</code> がファイルを Launch Services に渡し、
        <code>.html</code> が既定のブラウザへルーティングされます。Finder で
        ダブルクリックするのと同等の CLI 操作です。

  - type: window
    windowTitle: Conway's Game of Life
    subtitle: localhost — game-of-life.html
    content:
      kind: video
      src: movie.mov
    comment:
      en: >-
        The page loads straight from the filesystem over <code>file://</code>
        — no server, no build. A glider drifts across the grid, and the
        controls let you seed a random board or tune the frame rate.
      ja: >-
        ページは <code>file://</code> でファイルシステムから直接読み込まれます —
        サーバーもビルドも不要です。グライダーがグリッド上を進み、コントロールで
        ランダムな盤面の初期化やフレームレートの調整ができます。

  - type: assistant
    final: true
    html: >-
      <p>Opened in your default browser. Click <strong>Start</strong> to
      animate the glider, or <strong>Random</strong> to seed the whole
      board.</p>
    comment:
      en: >-
        That's the full loop: install, log in, prompt, result. From here,
        every Claude Code workflow is just another prompt in this same REPL.
      ja: >-
        これで一連のループが完成です：インストール、ログイン、プロンプト、結果。
        ここから先の Claude Code のワークフローはすべて、この同じ REPL への
        別のプロンプトにすぎません。
