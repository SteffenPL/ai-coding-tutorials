  - type: window
    windowTitle: README.md
    subtitle: markdown · rendered
    content:
      kind: markdown
      text: |
        # Nuclei Segmentation Notes

        This is a **markdown** window. The same text is shown rendered on the left
        and as highlighted source below — they share the same string constant.

        ## Features

        - Headings, *emphasis*, **strong**, `inline code`
        - Ordered and unordered lists
        - [Links](https://example.com), blockquotes, and GFM tables
        - Fenced code blocks (highlighted via Shiki)
        - KaTeX math — inline and display

        > Segmentation of touching objects requires a separation step. Watershed is
        > the classic choice for round, bright objects on dark backgrounds.

        ### Math

        The Gaussian filter applies a convolution with kernel $g(x, y) = \frac{1}{2\pi\sigma^2} e^{-(x^2 + y^2) / (2\sigma^2)}$ — smoothing scales with $\sigma$.

        Particle area is counted in pixels; converting to physical units:

        $$
        A_\text{phys} = A_\text{px} \cdot p_x \cdot p_y, \qquad \text{where } p_x, p_y \text{ are pixel pitches in } \mu\text{m}.
        $$

        The Euler characteristic of the binary mask counts connected components minus holes:

        $$\chi = C - H$$

        ### Code

        ```python
        import numpy as np
        from skimage import filters, measure

        def segment(image, sigma=2):
            blurred = filters.gaussian(image, sigma=sigma)
            threshold = filters.threshold_otsu(blurred)
            return measure.label(blurred > threshold)
        ```

        ### Results table

        | Metric | Value | Unit |
        |--------|------:|------|
        | Count        | 25    | —      |
        | Mean area    | 487   | px²    |
        | Mean circ.   | 0.88  | —      |
        | Processing   | 286   | ms     |
    comment: >-
      <strong>markdown</strong> — parsed with <code>marked</code>, math
      rendered by <strong>KaTeX</strong> (<code>$…$</code> inline +
      <code>$$…$$</code> display), fenced code blocks highlighted by
      <strong>Shiki</strong>.

