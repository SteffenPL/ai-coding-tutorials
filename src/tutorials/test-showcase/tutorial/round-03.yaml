  - type: window
    windowTitle: segment.py
    subtitle: source · python
    content:
      kind: source
      language: python
      text: |
        import numpy as np
        from skimage import filters, measure

        def segment_nuclei(image):
            """Classic threshold + watershed pipeline."""
            blurred = filters.gaussian(image, sigma=2)
            threshold = filters.threshold_otsu(blurred)
            mask = blurred > threshold
            labels = measure.label(mask)
            props = measure.regionprops(labels)
            return labels, props

        if __name__ == "__main__":
            print(f"Found {len(props)} nuclei")
    comment: >-
      <strong>source</strong> — syntax-highlighted source code with line
      numbers. The <code>language</code> hint drives the highlighter.

