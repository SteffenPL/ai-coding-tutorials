prompt: Show me every chat step type you support.

steps:
  - type: divider
    label: Text & reasoning

  - type: assistant
    html: >-
      <p>Sure — here is a regular <strong>assistant</strong> message. It
      supports inline HTML like <code>code</code>, <em>emphasis</em>, and
      <a href="#">links</a>.</p>
    comment: >-
      The <strong>assistant</strong> step is the default Claude message. It
      accepts raw HTML so you can embed code, links, and formatting.

  - type: thinking
    text: |-
      The user wants a demonstration of every step type. Let me walk through them in order — first the text/reasoning group, then the tool-flow group, then the display group.

      I should also include a divider before each group so the sections are visually separated.
    duration: 4s
    comment: >-
      The <strong>thinking</strong> step is a collapsible reasoning block
      (mauve). The <code>duration</code> field is optional and shown as a
      small label.

  - type: question
    html: <p>Would you like me to continue through every remaining step type?</p>
    answer: Yes, show them all.
    comment: >-
      A <strong>question</strong> step renders Claude's question and a
      pre-selected user answer inline — not interactive, just displaying
      the Q&A flow that was recorded.

  - type: divider
    label: Compact chips
    comment: >-
      Consecutive steps with <code>compact: true</code> are grouped into a
      <strong>CompactChipFlow</strong> — type-colored pills in a flex-wrap
      layout. Click a chip to expand it inline.

  - type: tool_call
    toolName: ToolSearch
    code: '{ "query": "select:mcp__fiji-mcp__run_ij_macro", "max_results": 2 }'
    compact: true

  - type: tool_result
    text: "Found 2 tools matching query"
    compact: true

  - type: tool_call
    toolName: fiji · run_ij_macro
    code: '{ "code": "open(\"/path/to/image.tif\");" }'
    compact: true

  - type: thinking
    text: "Let me check the result of opening the image..."
    duration: 2s
    compact: true

  - type: divider
    label: Tool flow

  - type: permission
    tool: Bash
    description: ls -la ~/testbed
    granted: true
    comment: >-
      A <strong>permission</strong> step with <code>granted: true</code> —
      shows the "Allow" response.

  - type: tool_call
    toolName: Bash
    code: ls -la ~/testbed
    comment: >-
      A <strong>tool_call</strong> step shows the tool name in the header
      and the code/arguments in a monospace block.

  - type: tool_call
    toolName: fiji · run_ij_macro
    code: |-
      selectWindow("Osteosarcoma_01.tif");
      run("Duplicate...", "title=nuclei_source");
      run("Split Channels");
      selectWindow("nuclei_source (red)");
      close();
      selectWindow("nuclei_source (green)");
      close();
      selectWindow("nuclei_source (blue)");
      rename("nuclei_blue");
      run("Gaussian Blur...", "sigma=2");
      setAutoThreshold("Otsu dark");
      run("Convert to Mask");
      run("Open");
      run("Watershed");
    comment: >-
      A <strong>long tool_call</strong> with 14 lines of code — auto-folds
      to show the first 2 lines with a "show N more lines" toggle.

  - type: tool_result
    text: |-
      drwxr-xr-x   5 user  staff   160 Apr 17 14:02 .
      drwxr-xr-x  42 user  staff  1344 Apr 17 14:00 ..
      -rw-r--r--   1 user  staff  2048 Apr 17 14:02 README.md
      -rw-r--r--   1 user  staff   512 Apr 17 14:02 config.json

  - type: permission
    tool: Bash
    description: rm -rf /
    granted: false
    comment: >-
      A <strong>permission</strong> step with <code>granted: false</code>
      — shows the "Deny" response.

  - type: divider
    label: Status & data

  - type: status
    text: ✓ All 42 tests passed
    variant: success
    comment: 'A <strong>status</strong> badge with <code>variant: "success"</code>.'

  - type: status
    text: "ℹ Cache hit ratio: 87%"
    variant: info
    comment: 'Same step with <code>variant: "info"</code>.'

  - type: status
    text: ⚠ 3 deprecation warnings
    variant: warning
    comment: 'Same step with <code>variant: "warning"</code>.'

  - type: status
    text: "✗ Build failed: exit code 1"
    variant: error
    comment: 'Same step with <code>variant: "error"</code>.'

  - type: table
    columns: ["Measure", "Value", "Unit"]
    rows:
      - ["Area", "243", "px²"]
      - ["Perimeter", "58.3", "px"]
      - ["Circularity", "0.88", "—"]
      - ["Mean intensity", "142.7", "gray"]
    moreRows: 12
    comment: >-
      A <strong>table</strong> step — columns, rows, and an optional "+N
      more rows" footer.

  - type: assistant
    final: true
    html: >-
      <p>That covers every chat-side step type. The next round demonstrates
      all the <strong>window content kinds</strong> on the desktop side.</p>
    comment: >-
      An <strong>assistant</strong> step with <code>final: true</code> —
      visually highlighted with a teal left-bar to indicate it answers the
      round prompt.
