prompt: Show me every chat step type you support.

steps:
  - type: thinking
    text: |-
      The user wants a demonstration of every chat step type. Let me enumerate them: assistant, thinking, question, tool_call, tool_result, permission, output, status, table, divider. I'll walk through them grouped by purpose — text/reasoning, tool flow, and status/data — with a divider before each group.

      (Full-log note: this thinking block is longer than the simplified version, which is the point of the "Full Log" toggle.)
    duration: 9s

  - type: assistant
    html: >-
      <p>Sure — here is a regular <strong>assistant</strong> message. It
      supports inline HTML like <code>code</code>, <em>emphasis</em>, and
      <a href="#">links</a>.</p>

  - type: divider
    label: Tool flow

  - type: permission
    tool: Bash
    description: ls -la ~/testbed
    granted: true

  - type: tool_call
    toolName: Bash
    code: ls -la ~/testbed

  - type: tool_result
    text: |-
      drwxr-xr-x   5 user  staff   160 Apr 17 14:02 .
      drwxr-xr-x  42 user  staff  1344 Apr 17 14:00 ..
      -rw-r--r--   1 user  staff  2048 Apr 17 14:02 README.md
      -rw-r--r--   1 user  staff   512 Apr 17 14:02 config.json
      -rw-r--r--   1 user  staff  8192 Apr 17 14:01 pipeline.log
      drwxr-xr-x   2 user  staff    64 Apr 17 13:55 data

  - type: assistant
    final: true
    html: >-
      <p>(Full-log variant — contains extra thinking detail and a longer
      directory listing compared to the simplified round.)</p>

  - type: status
    text: ✓ Round complete — 1 tool call, 47ms
    variant: success
